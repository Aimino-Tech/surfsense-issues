name: SLA Monitor
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-sla:
    runs-on: ubuntu-latest
    steps:
      - name: Find Priority Issues Past SLA Threshold
        id: find
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BREACHES="[]"

          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi

            NUM=$(echo "$line" | cut -d'|' -f1)
            TITLE=$(echo "$line" | cut -d'|' -f2)
            CREATED=$(echo "$line" | cut -d'|' -f3)
            PRIORITY=$(echo "$line" | cut -d'|' -f4)

            HOURS_OPEN=$(python3 -c '
          import sys
          from datetime import datetime, timezone
          created = datetime.fromisoformat(sys.argv[1].replace("Z", "+00:00"))
          now = datetime.now(timezone.utc)
          delta = now - created
          print(f"{delta.total_seconds() / 3600:.1f}")
          ' "$CREATED")
            if [ "$PRIORITY" = "critical" ]; then
              THRESHOLD=1
            else
              THRESHOLD=4
            fi

            IN_RANGE=$(python3 -c "print($HOURS_OPEN >= $THRESHOLD)")

            if [ "$IN_RANGE" = "True" ]; then
              BREACHES=$(echo "$BREACHES" | jq \
                --arg num "$NUM" \
                --arg title "$TITLE" \
                --arg created "$CREATED" \
                --arg priority "$PRIORITY" \
                --arg hours "$HOURS_OPEN" \
                '. + [{
                  "number": $num,
                  "title": $title,
                  "created_at": $created,
                  "priority": $priority,
                  "hours_open": $hours
                }]')
            fi
          done < <(gh issue list \
            --label "priority-critical,priority-high" \
            --search "is:open -label:stalled" \
            --json number,title,createdAt,labels \
            --jq '.[] | select(
              (.labels | any(.name == "priority-critical")) or
              (.labels | any(.name == "priority-high"))
            ) | [
              .number,
              .title,
              .createdAt,
              if (.labels | any(.name == "priority-critical")) then "critical" else "high" end
            ] | @tsv' | sed 's/\t/|/g')

          echo "breaches_json=$BREACHES" >> $GITHUB_OUTPUT
          COUNT=$(echo "$BREACHES" | jq 'length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Comment on Breached Issues
        if: ${{ fromJson(steps.find.outputs.count) > 0 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BREACHES: ${{ steps.find.outputs.breaches_json }}
        run: |
          echo "$BREACHES" | jq -c '.[]' | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            PRIORITY=$(echo "$issue" | jq -r '.priority')
            HOURS=$(echo "$issue" | jq -r '.hours_open')

            gh issue comment "$NUM" --body \
              "⚠️ **SLA BREACH**: This $PRIORITY-priority issue has been open for ${HOURS}h without being triaged.

              Expected response time for ${PRIORITY} priority: $([ "$PRIORITY" = "critical" ] && echo "1 hour" || echo "4 hours").

              This issue has been escalated. A team member will follow up shortly."
          done

      - name: Alert on SLA Breach
        if: ${{ fromJson(steps.find.outputs.count) > 0 }}
        run: |
          COUNT=${{ steps.find.outputs.count }}
          echo "::warning::⚠️ SLA BREACH: $COUNT priority issues beyond SLA threshold"

      - name: Attach Breach Summary
        if: ${{ fromJson(steps.find.outputs.count) > 0 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Current SLA Breaches" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.find.outputs.breaches_json }}" | jq -c '.[]' | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            TITLE=$(echo "$issue" | jq -r '.title')
            PRIORITY=$(echo "$issue" | jq -r '.priority')
            HOURS=$(echo "$issue" | jq -r '.hours_open')
            echo "- [#$NUM](https://github.com/${{ github.repository }}/issues/$NUM) — $TITLE ($PRIORITY, ${HOURS}h open)" >> $GITHUB_STEP_SUMMARY
          done
