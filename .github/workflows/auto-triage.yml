name: Auto Triage
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Classify Issue
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title;
            const body = context.payload.issue.body || '';

            const combined = (title + ' ' + body).toLowerCase();

            let category = 'FEATURE';
            let priority = 'medium';

            if (/bug|error|crash|fail|broken|wrong|incorrect/.test(combined)) {
              category = 'BUG';
            } else if (/writing|score|quality|agent output|scoring/.test(combined)) {
              category = 'WRITING_QUALITY';
            } else if (/xp|streak|achievement|spinner|gamif|reward/.test(combined)) {
              category = 'GAMIFICATION';
            } else if (/billing|login|password|account|payment|plan|tier|subscribe/.test(combined)) {
              category = 'ACCOUNT';
            }

            if (/critical|urgent|blocking|unusable/.test(combined)) {
              priority = 'critical';
            } else if (/high|important/.test(combined)) {
              priority = 'high';
            } else if (/low|minor|trivial|cosmetic/.test(combined)) {
              priority = 'low';
            }

            const labelMap = { 'BUG': 'bug', 'FEATURE': 'feature', 'WRITING_QUALITY': 'writing', 'GAMIFICATION': 'gamification', 'ACCOUNT': 'account' };
            const categoryLabel = 'priority-' + priority;

            core.setOutput('category', category);
            core.setOutput('priority', priority);
            core.setOutput('category_label', labelMap[category] || 'feature');
            core.setOutput('priority_label', categoryLabel);

      - name: Apply Labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CATEGORY: ${{ steps.classify.outputs.category_label }}
          PRIORITY: ${{ steps.classify.outputs.priority_label }}
        run: |
          gh issue edit -R ${{ github.repository }} ${{ github.event.issue.number }} \
            --add-label "$CATEGORY" \
            --add-label "$PRIORITY" \
            --remove-label "needs-triage" 2>/dev/null || true

      - name: Check Duplicates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          CATEGORY: ${{ steps.classify.outputs.category_label }}
        run: |
          gh issue list -R ${{ github.repository }} \
            --label "$CATEGORY" \
            --state open \
            --json number,title \
            --jq '.[] | "\(.number)|\(.title)"' > /tmp/issues.txt
          SIMILAR=""
          while IFS='|' read -r num title; do
            SIM=$(python3 -c '
          import sys
          from difflib import SequenceMatcher
          t1 = sys.argv[1].lower()
          t2 = sys.argv[2].lower()
          ratio = SequenceMatcher(None, t1, t2).ratio()
          if ratio > 0.7:
              print(f"#{sys.argv[3]}: {sys.argv[2]} ({ratio:.0%} match)")
          ' "$ISSUE_TITLE" "$title" "$num" 2>/dev/null)
            if [ -n "$SIM" ]; then
              SIMILAR="$SIMILAR$SIM"$'\n'
            fi
          done < /tmp/issues.txt
          if [ -n "$SIMILAR" ]; then
            gh issue comment -R ${{ github.repository }} ${{ github.event.issue.number }} \
              --body "🔁 **Possible duplicate**: $(echo "$SIMILAR" | head -3)"
          fi

      - name: Post Auto-Response
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CATEGORY: ${{ steps.classify.outputs.category }}
          PRIORITY: ${{ steps.classify.outputs.priority }}
        run: |
          AUTHOR="${{ github.event.issue.user.login }}"
          SEVERITY_LABELS=$(gh issue view -R ${{ github.repository }} ${{ github.event.issue.number }} --json labels --jq '.labels[].name' | grep 'severity-' || echo "none")
          IS_CRITICAL=false
          if echo "$SEVERITY_LABELS" | grep -q 'severity-critical'; then
            IS_CRITICAL=true
          fi

          ESCALATION_NOTE=""
          if [ "$IS_CRITICAL" = "true" ]; then
            ESCALATION_NOTE="\n\n_This has been escalated to the on-call engineer._"
          fi

          DUPLICATE_NOTE=""
          SIMILAR=$(gh issue view -R ${{ github.repository }} ${{ github.event.issue.number }} --json comments --jq '.comments[] | select(.body | contains("Possible duplicate")) | .body' | head -1)
          if [ -n "$SIMILAR" ]; then
            RELATED_NUM=$(echo "$SIMILAR" | grep -oP '#\d+' | head -1)
            DUPLICATE_NOTE="\n\n🔁 This may be related to $RELATED_NUM. Please check if that covers your issue."
          fi

          BODY=$(cat <<ENDBODY
          Hi @${AUTHOR}, thanks for the report! 🤖

          I've classified this as **[${{ env.CATEGORY }}]** with **${{ env.PRIORITY }}** priority.${DUPLICATE_NOTE}

          **Next steps:**
          - Our team will review this based on the priority and support tier (see [SUPPORT.md](https://github.com/${{ github.repository }}/blob/main/SUPPORT.md) for SLA details)
          - In the meantime, can you confirm:
            - Does this happen consistently or intermittently?
            - If you haven't already, please add the version you're running
          ${ESCALATION_NOTE}
          ENDBODY
          )
          echo "$BODY" > /tmp/response_body.md
          gh issue comment -R ${{ github.repository }} ${{ github.event.issue.number }} --body-file /tmp/response_body.md
