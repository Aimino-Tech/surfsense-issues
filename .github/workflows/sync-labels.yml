name: Sync Labels
on:
  push:
    branches: [main]
    paths: ['.github/labels.yml']
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Labels from labels.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
import json, os, subprocess, sys, urllib.parse

try:
    import yaml
except ImportError:
    subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'pyyaml', '-q'])
    import yaml

with open('.github/labels.yml') as f:
    labels = yaml.safe_load(f)

if not isinstance(labels, list):
    print('labels.yml must contain a list')
    sys.exit(1)

repo_full = os.environ['GITHUB_REPOSITORY']

result = subprocess.run(
    ['gh', 'api', f'/repos/{repo_full}/labels', '--paginate'],
    capture_output=True, text=True
)
existing = json.loads(result.stdout)
existing_names = {l['name'] for l in existing}

for label in labels:
    name = label['name']
    if name in existing_names:
        encoded = urllib.parse.quote(name, safe='')
        url = f'/repos/{repo_full}/labels/{encoded}'
        data = {'color': label.get('color', 'ededed'), 'description': label.get('description', '')}
        subprocess.run(['gh', 'api', url, '--method', 'PATCH', '--input', '-'],
            input=json.dumps(data), capture_output=True, text=True)
        print(f'Updated label: {name}')
    else:
        url = f'/repos/{repo_full}/labels'
        data = {'name': name, 'color': label.get('color', 'ededed'), 'description': label.get('description', '')}
        subprocess.run(['gh', 'api', url, '--method', 'POST', '--input', '-'],
            input=json.dumps(data), capture_output=True, text=True)
        print(f'Created label: {name}')

# List existing labels again to show preserved ones
result2 = subprocess.run(
    ['gh', 'api', f'/repos/{repo_full}/labels', '--paginate'],
    capture_output=True, text=True
)
existing2 = json.loads(result2.stdout)
defined_names = {l['name'] for l in labels}
for l in existing2:
    if l['name'] not in defined_names:
        print(f'Preserved existing label (not in labels.yml): {l["name"]}')

print(f'Sync complete: {len(labels)} labels processed')
PYEOF
