name: Feedback Loop
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stalled:
    runs-on: ubuntu-latest
    steps:
      - name: Find Stalled Issues
        id: stalled
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALLED_ISSUES="[]"
          FOURTEEN_DAYS_AGO=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          SEVEN_DAYS_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)

          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            STALLED_ISSUES=$(echo "$STALLED_ISSUES" | jq \
              --arg num "$(echo "$line" | cut -d'|' -f1)" \
              --arg title "$(echo "$line" | cut -d'|' -f2)" \
              --arg updated "$(echo "$line" | cut -d'|' -f3)" \
              '. + [{"number": $num, "title": $title, "updated_at": $updated}]')
          done < <(gh issue list \
            --label "needs-info" \
            --json number,title,updatedAt \
            --jq '.[] | select(
              .updatedAt <= $FOURTEEN_DAYS_AGO
            ) | [.number, .title, .updatedAt] | @tsv' \
            2>/dev/null | sed 's/\t/|/g')

          # Also find issues with no activity for 30 days (not closed)
          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            STALLED_ISSUES=$(echo "$STALLED_ISSUES" | jq \
              --arg num "$(echo "$line" | cut -d'|' -f1)" \
              --arg title "$(echo "$line" | cut -d'|' -f2)" \
              --arg updated "$(echo "$line" | cut -d'|' -f3)" \
              '. + [{"number": $num, "title": $title, "updated_at": $updated}]')
          done < <(gh issue list \
            --search "updated:<$(date -u -d '30 days ago' +%Y-%m-%d)" \
            --json number,title,updatedAt \
            --jq '.[] | select(
              (.labels | any(.name == "needs-info") | not)
            ) | [.number, .title, .updatedAt] | @tsv' \
            2>/dev/null | sed 's/\t/|/g')

          echo "count=$(echo "$STALLED_ISSUES" | jq 'length')" >> $GITHUB_OUTPUT
          echo "stalled=$STALLED_ISSUES" >> $GITHUB_OUTPUT

      - name: Comment on Needs-Info Issues (14 days)
        if: ${{ fromJson(steps.stalled.outputs.count) > 0 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '${{ steps.stalled.outputs.stalled }}' | jq -c '.[]' | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            TITLE=$(echo "$issue" | jq -r '.title')
            UPDATED=$(echo "$issue" | jq -r '.updated_at')
            gh issue comment "$NUM" --body \
              "⏰ **This issue has been stalled for 14 days.**

              We need additional information to proceed. If we don't hear back within 7 days, this issue will be closed automatically.

              Please provide the requested information above so we can investigate further.

              _If you no longer need this, you can close the issue yourself._"
          done

      - name: Close Stalled Issues (30 days no activity)
        if: ${{ fromJson(steps.stalled.outputs.count) > 0 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '${{ steps.stalled.outputs.stalled }}' | jq -c '.[]' | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            gh issue close "$NUM" \
              --comment "This issue has been automatically closed due to 30 days of inactivity. If this is still relevant, please reopen with updated information." \
              --reason "not_planned"
          done

      - name: Generate Report
        run: |
          COUNT=${{ steps.stalled.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            echo "### Feedback Loop Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**$COUNT stalled issues processed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Issue | Title | Last Updated | Action |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
            echo '${{ steps.stalled.outputs.stalled }}' | jq -c '.[]' | while read -r issue; do
              NUM=$(echo "$issue" | jq -r '.number')
              TITLE=$(echo "$issue" | jq -r '.title')
              UPDATED=$(echo "$issue" | jq -r '.updated_at')
              echo "| #$NUM | $TITLE | $UPDATED | Commented/Closed |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "### Feedback Loop Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No stalled issues found. All issues are actively managed." >> $GITHUB_STEP_SUMMARY
          fi
