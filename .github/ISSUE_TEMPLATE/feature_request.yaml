name: Feature Request
description: Suggest an idea for SurfSense
title: "[Feature] "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! The more detail you provide, the better we can evaluate and prioritize your request.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe what you're trying to accomplish.
      placeholder: "I'm frustrated when I have to manually..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible about what it should do.
      placeholder: "I'd like a button that automatically..."
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current Workaround
      description: How are you handling this today? Do you have any workaround?
      placeholder: "Currently I manually export and re-import data..."
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How impactful would this feature be for you?
      options:
        - Critical (blocking my workflow)
        - High (significant improvement)
        - Medium (nice to have)
        - Low (minor enhancement)
    validations:
      required: true
  - type: dropdown
    id: feature_area
    attributes:
      label: Feature Area
      description: Which part of SurfSense does this relate to?
      options:
        - Writing Agent
        - Scoring
        - Gamification
        - Spinner
        - Editor
        - API
        - Frontend
        - Backend
        - Browser Extension
        - Desktop App
        - Obsidian Plugin
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, sketches, or references about the feature request here
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have checked that this feature has not been requested before
          required: true
        - label: I have included all required information above
          required: true
