name: Bug Report
description: Report a bug to help us improve SurfSense
title: "[Bug] "
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible so we can reproduce and fix the issue.
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (core feature broken, app unusable)
        - High (feature broken, no workaround)
        - Medium (feature broken, has workaround)
        - Low (cosmetic, non-blocking)
    validations:
      required: true
  - type: dropdown
    id: feature_area
    attributes:
      label: Feature Area
      description: Which part of SurfSense is affected?
      options:
        - Writing Agent
        - Scoring
        - Gamification
        - Spinner
        - Editor
        - API
        - Frontend
        - Backend
        - Browser Extension
        - Desktop App
        - Obsidian Plugin
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SurfSense Version
      description: What version of SurfSense are you running? Run `git log -1 --oneline` in your SurfSense directory.
      placeholder: "e.g. a1b2c3d"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: "When I try to use the writing agent, it returns an error instead of generating text..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
      placeholder: "The writing agent should generate the requested text"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots, console logs, or error messages to help explain your problem
      render: shell
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running SurfSense?
      options:
        - Docker Compose (self-hosted)
        - Desktop App
        - Browser Extension
        - Obsidian Plugin
        - Cloud (hosted by Aimino)
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have checked that this bug has not been reported before
          required: true
        - label: I have included all required information above
          required: true
